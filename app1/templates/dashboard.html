{% extends 'base.html' %}

{% block content %}
<div class="table-wrapper" style="padding: 30px;">
    <h2>Welcome to your Dashboard, {{ request.session.username }}!</h2>
    <p style="color: var(--text-muted); margin-top: 10px;">
        Role: <strong style="color: var(--accent); text-transform: capitalize;">{{ request.session.role }}</strong>
    </p>
    <div style="margin-top: 30px; color: var(--text-muted);">
        <p>Use the sidebar on the left to navigate your available features.</p>
    </div>
</div>
{% endblock %}

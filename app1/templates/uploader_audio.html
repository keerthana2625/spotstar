{% extends 'base.html' %}

{% block content %}
<div class="auth-container">
    <h2 style="text-align: center;">Upload Audio File</h2>
    {% if error %}
        <div class="error-msg">{{ error }}</div>
    {% endif %}
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="form-group">
            <label>Title *</label>
            <input type="text" name="title" required>
        </div>
        <div class="form-group">
            <label>Music Director *</label>
            <input type="text" name="music_director" required>
        </div>
        <div class="form-group">
            <label>Singer *</label>
            <input type="text" name="singer" required>
        </div>
        <div class="form-group">
            <label>Release Year</label>
            <input type="number" name="release_year" min="1900" max="2100">
        </div>
        <div class="form-group">
            <label>Release Date</label>
            <input type="date" name="release_date">
        </div>
        <div class="form-group">
            <label>Cover Image / Thumbnail (Optional, .jpg/.png)</label>
            <input type="file" style="background: none; padding-left: 0;" name="thumbnail" accept="image/*">
        </div>
        
        <div class="form-group">
            <label>Audio File (.mp3, .wav max 20MB) *</label>
            <input type="file" style="background: none; padding-left: 0;" name="file" accept="audio/*" required>
        </div>
        <button type="submit" class="btn">Upload to Spotstar</button>
    </form>
</div>
{% endblock %}
